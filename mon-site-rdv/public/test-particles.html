<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Particles.js Isolée</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <!-- Ton fichier particles.js local -->
  <script src="particles.js"></script>  <!-- ← mets ton fichier à côté de ce HTML -->

  <!-- OU via CDN si tu veux comparer -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script> -->

  <script>
    // Si ton particles.js ne lance pas l’init automatiquement, force-la ici
    window.addEventListener('load', () => {
      if (window.particlesJS) {
        particlesJS('particles-js', {
          // Colle ici ta config si elle n’est pas déjà dans particles.js
          "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#00ffff" },  // CYAN pour être SÛR de voir
            "shape": { "type": "circle" },
            "opacity": { "value": 0.9 },
            "size": { "value": 6 },
            "line_linked": { "enable": true, "distance": 150, "color": "#00ffff", "opacity": 0.6, "width": 1.5 },
            "move": { "enable": true, "speed": 6 }
          },
          "interactivity": {
            "events": {
              "onhover": { "enable": true, "mode": "repulse" },
              "onclick": { "enable": true, "mode": "push" },
              "resize": true
            }
          },
          "retina_detect": true
        });
        console.log('Particles lancé depuis test HTML');
      } else {
        console.error('particlesJS non défini');
      }
    });
  </script>
</body>
</html>
